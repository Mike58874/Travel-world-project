<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>

    <link rel="stylesheet" href="css/login.css">
</head>
<body>

    <header>
        <h1>TRAVEL WITH MIKE</h1>
        <nav>
            <a href="index.html">Beranda</a>
            <a href="login.html">Login</a>
            <a href="destinasi.html">Destinasi</a>
            <a href="paketwisata.html">Paket Wisata</a>
            <a href="about_us.html">About Us</a>
        </nav>
    </header>

    <section class="beranda">

        <div class="auth-container">

            <div id="login-box" class="form-box">
                <h2>Login</h2>
                <form id="form-login">
                    <input type="text" placeholder="Email / Username" required>
                    <input type="password" placeholder="Password" required>
                    <button type="submit">Login</button>
                </form>

                <div class="divider">atau</div>

                <div class="social-login">
                    <button class="social-btn">
                        <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png" alt="Google">
                    </button>
                    <button class="social-btn facebook">
                        <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png" alt="Facebook">
                    </button>
                </div>

                <p class="switch-text">Belum punya akun? <a href="register.html">Daftar sekarang</a></p>
            </div>

        </div>

    </section>

    <script src="jss/loginscript.js"></script>
</body>
</html>
